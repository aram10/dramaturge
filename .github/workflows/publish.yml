name: Publish Dramaturge

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-npm:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.release.prerelease && startsWith(github.event.release.tag_name, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Update npm CLI for trusted publishing
        run: npm install --global npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Build package
        run: pnpm run build

      - name: Publish package to npm with OIDC
        run: |
          npm config delete //registry.npmjs.org/:_authToken --location=user || true
          unset NODE_AUTH_TOKEN
          npm publish --provenance --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ''

  publish-github-packages:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.release.prerelease && startsWith(github.event.release.tag_name, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: '@aram10'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Build package
        run: pnpm run build

      - name: Rewrite package metadata for GitHub Packages
        run: |
          npm pkg set name=@aram10/dramaturge
          npm pkg set publishConfig.registry=https://npm.pkg.github.com

      - name: Publish package to GitHub Packages
        run: pnpm publish --no-git-checks --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
